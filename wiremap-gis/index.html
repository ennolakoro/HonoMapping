<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WireMap GIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  </head>
  <body>
    <div id="app"></div>
    <!-- Konfigurasi Backend URL (auto-detect: lokal atau VPS) -->
    <script>
      // Otomatis mendeteksi environment:
      // - Jika diakses dari localhost → pakai backend lokal
      // - Jika diakses dari domain/IP lain → pakai backend VPS di IP yang sama port 8787
      (function() {
        var host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          window.__BACKEND_URL__ = 'http://127.0.0.1:8787';
        } else {
          // Saat diakses dari luar (domain/IP VPS), gunakan IP/hostname yang sama port 8787
          window.__BACKEND_URL__ = window.location.protocol + '//' + host + ':8787';
        }
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
